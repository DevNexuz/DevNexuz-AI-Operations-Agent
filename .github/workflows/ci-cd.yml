# =============================================================================
# AI Operations Agent — GitHub Actions CI/CD Pipeline (Fixed)
# =============================================================================
# Portfolio Project: Autonomous Data Analysis Framework
# Tech Stack: Python 3.11, Conda, LangChain, Multi-Provider LLMs
# Target Role: Agentic Engineer - Enterprise AI/ML Systems
# =============================================================================

name: AI Operations Agent CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # Code Quality and Testing
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio black ruff mypy
    
    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .
    
    - name: Type check with MyPy
      run: |
        mypy agent/ tools/ --ignore-missing-imports
    
    - name: Run tests
      run: |
        pytest tests/ --cov=agent --cov=tools --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Run Bandit security linter
      run: |
        pip install bandit[toml]
        bandit -r agent/ tools/ -f json -o bandit-report.json
    
    - name: Upload Bandit results
      uses: actions/upload-artifact@v3
      with:
        name: bandit-report
        path: bandit-report.json

  # Docker Build and Test
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ai-ops-agent:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
    
    - name: Test Docker container
      run: |
        docker run --rm ai-ops-agent:test python main.py --demo
    
    - name: Scan Docker image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'ai-ops-agent:test'
        format: 'sarif'
        output: 'docker-trivy-results.sarif'
    
    - name: Upload Docker scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'docker-trivy-results.sarif'

  # Performance Testing
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-benchmark memory-profiler
    
    - name: Run performance tests
      run: |
        pytest tests/performance/ --benchmark-json=benchmark.json
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: benchmark.json

  # Documentation Build
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin
    
    - name: Build documentation
      run: |
        mkdocs build
    
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site

  # Release and Deployment
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, security, docker, performance]
    if: github.event_name == 'release'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/ai-ops-agent:latest
          ${{ secrets.DOCKER_USERNAME }}/ai-ops-agent:${{ github.event.release.tag_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILD_DATE=${{ github.event.release.published_at }}
          VCS_REF=${{ github.sha }}
          VERSION=${{ github.event.release.tag_name }}
    
    - name: Generate deployment package
      run: |
        tar -czf ai-ops-agent-${{ github.event.release.tag_name }}.tar.gz \
          --exclude='.git' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.pytest_cache' \
          --exclude='htmlcov' \
          --exclude='.coverage' \
          --exclude='.mypy_cache' \
          .
    
    - name: Upload deployment package
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./ai-ops-agent-${{ github.event.release.tag_name }}.tar.gz
        asset_name: ai-ops-agent-${{ github.event.release.tag_name }}.tar.gz
        asset_content_type: application/gzip

  # Integration Tests (Multi-LLM)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        provider: [groq, openai, anthropic, ollama]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Setup Ollama (for Ollama tests)
      if: matrix.provider == 'ollama'
      run: |
        curl -fsSL https://ollama.ai/install.sh | sh
        ollama serve &
        sleep 10
        ollama pull llama3
    
    - name: Run integration test
      env:
        LLM_PROVIDER: ${{ matrix.provider }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        cat > test_integration.py << 'EOF'
import os
from agent import get_llm, AgentMemory, Planner, Executor
from tools import ALL_TOOLS

print(f'Testing {os.environ.get("LLM_PROVIDER")} integration...')
llm = get_llm()
memory = AgentMemory('Test goal: analyze sample data')
planner = Planner('tools catalog placeholder')
plan = planner.plan('Analyze data/sales.csv and find top regions')
executor = Executor(llm, ALL_TOOLS)
print('✓ Integration test passed')
EOF
        python test_integration.py
    
    - name: Report integration status
      run: |
        echo "✅ ${{ matrix.provider }} integration test completed successfully"

  # Portfolio Badge Generation
  badges:
    name: Update Badges
    runs-on: ubuntu-latest
    needs: [test, security, docker]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate badges
      run: |
        echo '![Tests](https://img.shields.io/badge/tests-passing-brightgreen)' > README.md.test-badge
        echo '![Security](https://img.shields.io/badge/security-passing-brightgreen)' > README.md.security-badge
        echo '![Docker](https://img.shields.io/badge/docker-ready-blue)' > README.md.docker-badge
    
    - name: Commit badges
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md.test-badge README.md.security-badge README.md.docker-badge
        git commit -m "Auto-update badges [skip ci]" || exit 0
        git push
